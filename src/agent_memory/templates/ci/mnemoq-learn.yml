# agent-memory-engine (mnemoq) CI auto-learning workflow.
#
# Copy this file into your repo at `.github/workflows/mnemoq-learn.yml`.
# It runs after your existing test workflow ("CI" by default) and turns
# structured CI signals (failing pytest tests, reverted PRs) into new
# entries in `memory/learnings.jsonl`.
#
# Write-back mode is controlled by the `ci_writeback` value in `memory/config.json`:
#   pr       — open/update a bot PR with the new entries (DEFAULT; human-gated).
#   artifact — emit candidates to the job summary only (zero-trust).
#   commit   — bot-push directly to the branch (opt-in; needs no branch protection).
#
# The hosted POST mode (team / Pro tier) is intentionally deferred.

name: mnemoq-learn

on:
  workflow_run:
    workflows: ["CI"]           # ← rename to match your test workflow
    types: [completed]
  pull_request:
    types: [closed]

permissions:
  contents: write                # needed for `commit` writeback
  pull-requests: write           # needed for `pr` writeback

jobs:
  learn:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' || github.event.workflow_run.conclusion != 'skipped' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50         # enough for revert detection

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install mnemoq
        run: pip install agent-memory-engine

      - name: Download JUnit report (if produced by the test workflow)
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: junit-report
          path: ./mnemoq-ci-report
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Evaluate CI report
        if: ${{ github.event_name == 'workflow_run' }}
        run: |
          if [ -f ./mnemoq-ci-report/junit.xml ]; then
            mnemoq --evaluate-ci ./mnemoq-ci-report/junit.xml | tee -a "$GITHUB_STEP_SUMMARY"
          else
            echo "No junit.xml artifact; skipping --evaluate-ci." | tee -a "$GITHUB_STEP_SUMMARY"
          fi

      - name: Run auto-learn (revert detection, repeated fixes)
        run: mnemoq --auto-learn | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Resolve writeback mode
        id: mode
        run: |
          MODE=$(python -c "import json,os; cfg=json.load(open('memory/config.json')); print(cfg.get('tuning', {}).get('ci_writeback', 'pr'))" 2>/dev/null || echo pr)
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "writeback mode: $MODE"

      - name: Write-back via PR
        if: steps.mode.outputs.mode == 'pr'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: mnemoq/auto-learnings
          commit-message: "chore(mnemoq): auto-learned entries"
          title: "mnemoq: new auto-learned entries"
          body: |
            Generated by `mnemoq-learn.yml`. Review the new entries in
            `memory/learnings.jsonl` before merging.
          add-paths: |
            memory/learnings.jsonl

      - name: Write-back via direct commit
        if: steps.mode.outputs.mode == 'commit'
        run: |
          git config user.name "mnemoq-bot"
          git config user.email "mnemoq-bot@users.noreply.github.com"
          if [ -n "$(git status --porcelain memory/)" ]; then
            git add memory/learnings.jsonl
            git commit -m "chore(mnemoq): auto-learned entries"
            git push
          else
            echo "No changes to memory/ — skipping commit."
          fi

      # `artifact` mode is a no-op: candidates already streamed to the job summary.
