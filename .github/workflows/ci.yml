name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Deploy engine to ~/.agent-memory
        run: |
          mkdir -p ~/.agent-memory/engine
          cp -r src/mnemoq ~/.agent-memory/engine/mnemoq
          cp -r templates ~/.agent-memory/engine/templates
          cp VERSION ~/.agent-memory/engine/VERSION
          cat > ~/.agent-memory/engine/filter.py <<'EOF'
          #!/usr/bin/env python3
          """Backward-compat wrapper - delegates to installed mnemoq package."""
          import sys
          from mnemoq.cli import main
          if __name__ == "__main__":
              sys.exit(main())
          EOF
          cat > ~/.agent-memory/engine/scaffold.py <<'EOF'
          #!/usr/bin/env python3
          """Backward-compat wrapper - delegates to installed mnemoq package."""
          import sys
          from mnemoq.scaffold import main
          if __name__ == "__main__":
              sys.exit(main())
          EOF
          cat > ~/.agent-memory/engine/update.py <<'EOF'
          #!/usr/bin/env python3
          """Backward-compat wrapper - delegates to installed mnemoq package."""
          import sys
          from mnemoq.update import main
          if __name__ == "__main__":
              sys.exit(main())
          EOF

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest
