[project]
name = "agent-memory-engine"
version = "1.16.0"
description = "Episodic memory system for AI agents"
requires-python = ">=3.10"

[project.optional-dependencies]
dev = ["pytest-cov>=4.0"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]

[tool.coverage.run]
source = ["src"]
omit = ["tests/*"]

[tool.coverage.report]
show_missing = true
fail_under = 0

[tool.ruff]
line-length = 120
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
